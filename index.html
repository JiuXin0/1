<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>英语选择题练习</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #1f2a32;
      --muted: #64717b;
      --line: #d9dfdc;
      --accent: #0b8f87;
      --accent-2: #e7f4f1;
      --bad: #b84d4d;
      --good: #16845d;
      --shadow: 0 16px 40px rgba(31, 42, 50, 0.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 18px;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 8px 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .top-actions, .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      min-height: 38px;
      padding: 0 14px;
      font-weight: 650;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }
    button:hover { transform: translateY(-1px); border-color: #9db5af; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .question-panel, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .question-panel {
      overflow: hidden;
    }

    .question-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(320px, 1.05fr);
      gap: 16px;
      padding: 16px;
      align-items: start;
    }

    .full-image {
      display: block;
      width: 100%;
      height: auto;
      background: #eef1e6;
    }

    .question-text {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfa;
      padding: 18px;
      min-height: 260px;
      white-space: pre-wrap;
      font-size: 22px;
      line-height: 1.55;
      font-weight: 650;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      min-height: 72px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }

    .option-text {
      font-size: 19px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .highlight {
      color: #b53434;
      text-decoration-line: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
      font-weight: 800;
    }

    .option:hover {
      border-color: #8eb4ad;
      background: #fbfffe;
    }

    .option .badge {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #edf2f0;
      color: #31424a;
      font-weight: 800;
    }

    .option.selected {
      border-color: var(--accent);
      background: var(--accent-2);
    }

    .option.correct {
      border-color: var(--good);
      background: #e8f6ef;
    }

    .option.wrong {
      border-color: var(--bad);
      background: #faecec;
    }

    .result {
      min-height: 28px;
      margin-top: 12px;
      font-weight: 700;
    }

    .result.good { color: var(--good); }
    .result.bad { color: var(--bad); }

    aside {
      padding: 16px;
      align-self: start;
      position: sticky;
      top: 16px;
    }

    .score {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 14px 0;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfa;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .nav-grid button {
      padding: 0;
      min-height: 36px;
      font-size: 13px;
    }

    .nav-grid button.done { background: #e8f6ef; border-color: #9ccbb9; }
    .nav-grid button.current { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nav-grid button.missed { background: #faecec; border-color: #d7aaaa; }

    dialog {
      width: min(920px, calc(100vw - 24px));
      border: 0;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 24px 70px rgba(0,0,0,0.28);
    }

    dialog::backdrop { background: rgba(12, 20, 24, 0.48); }

    .dialog-head {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .dialog-body {
      padding: 14px;
      max-height: 78vh;
      overflow: auto;
      background: #f8faf7;
    }

    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      aside { position: static; }
      .content { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>英语选择题练习</h1>
        <div class="meta" id="subtitle">正在加载题库...</div>
      </div>
      <div class="top-actions">
        <button id="shuffleBtn">重新随机</button>
        <button id="resetBtn">清空作答</button>
      </div>
    </header>

    <section class="question-panel">
      <div class="question-toolbar">
        <div>
          <strong id="qTitle">第 1 题</strong>
          <div class="meta" id="qMeta"></div>
        </div>
        <div class="controls">
          <button id="sourceBtn">查看原图</button>
          <button id="prevBtn">上一题</button>
          <button id="nextBtn" class="primary">下一题</button>
        </div>
      </div>
      <div class="content">
        <div id="questionText" class="question-text"></div>
        <div>
          <div id="options" class="options"></div>
          <div id="result" class="result"></div>
          <div class="controls" style="margin-top: 14px;">
            <button id="checkBtn" class="primary">提交本题</button>
            <button id="showAnswerBtn">显示答案</button>
          </div>
        </div>
      </div>
    </section>

    <aside>
      <strong>练习进度</strong>
      <div class="score">
        <div class="stat"><strong id="answeredCount">0</strong><span>已答</span></div>
        <div class="stat"><strong id="correctCount">0</strong><span>正确</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>错题</span></div>
        <div class="stat"><strong id="accuracy">0%</strong><span>正确率</span></div>
      </div>
      <button id="wrongOnlyBtn" style="width: 100%;">只练错题</button>
      <div id="navGrid" class="nav-grid"></div>
    </aside>
  </main>

  <dialog id="sourceDialog">
    <div class="dialog-head">
      <strong>原图核对</strong>
      <button id="closeDialogBtn">关闭</button>
    </div>
    <div class="dialog-body">
      <img id="fullImg" class="full-image" alt="原始题图" />
    </div>
  </dialog>

  <script>
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    let questions = [];
    let order = [];
    let current = 0;
    let wrongOnly = false;
    const state = new Map();

    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function highlightPattern(term) {
      return escapeHtml(term)
        .trim()
        .split(/\s+/)
        .map(escapeRegExp)
        .join('[\\s\\n]+');
    }

    function renderQuestionText(q) {
      let html = escapeHtml(q.questionText || '题干识别为空，请点击“查看原图”核对。');
      for (const term of q.highlightTerms || []) {
        if (!term) continue;
        const pattern = new RegExp(highlightPattern(term), 'g');
        html = html.replace(pattern, (match) => `<span class="highlight">${match}</span>`);
      }
      return html;
    }

    function answerSet(q) {
      return new Set(q.answerIndices || [q.answerIndex]);
    }

    function sameSet(a, b) {
      if (a.size !== b.size) return false;
      for (const value of a) if (!b.has(value)) return false;
      return true;
    }

    function shuffle(arr) {
      const copy = arr.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildOrder() {
      const base = wrongOnly
        ? questions.filter((q) => state.get(q.id)?.checked && !state.get(q.id)?.correct)
        : questions;
      order = shuffle(base.map((q) => q.id));
      current = 0;
    }

    function getQuestion() {
      return questions.find((q) => q.id === order[current]);
    }

    function ensureState(q) {
      if (!state.has(q.id)) {
        const shuffledOptions = shuffle(q.options.map((option, displayIndex) => ({ ...option, displayIndex })));
        state.set(q.id, {
          selected: new Set(),
          checked: false,
          correct: false,
          showAnswer: false,
          options: shuffledOptions,
        });
      }
      return state.get(q.id);
    }

    function render() {
      if (!questions.length || !order.length) return;
      const q = getQuestion();
      const s = ensureState(q);
      $('subtitle').textContent = `共 ${questions.length} 道题，题序和选项顺序已随机`;
      $('qTitle').textContent = `第 ${current + 1} / ${order.length} 题`;
      $('qMeta').textContent = `来源：${q.source} · ${q.type === 'multiple' ? '多选题' : '单选题'}`;
      $('questionText').innerHTML = renderQuestionText(q);

      const options = $('options');
      options.innerHTML = '';
      s.options.forEach((option, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option';
        if (s.selected.has(option.originalIndex)) btn.classList.add('selected');
        const answers = answerSet(q);
        const isAnswer = answers.has(option.originalIndex);
        if ((s.checked || s.showAnswer) && isAnswer) btn.classList.add('correct');
        if (s.checked && s.selected.has(option.originalIndex) && !isAnswer) btn.classList.add('wrong');
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = letters[i];
        const text = document.createElement('span');
        text.className = 'option-text';
        text.textContent = option.text || '选项识别为空';
        btn.appendChild(badge);
        btn.appendChild(text);
        btn.addEventListener('click', () => {
          if (s.checked) return;
          if (q.type === 'multiple') {
            if (s.selected.has(option.originalIndex)) s.selected.delete(option.originalIndex);
            else s.selected.add(option.originalIndex);
          } else {
            s.selected = new Set([option.originalIndex]);
          }
          render();
        });
        options.appendChild(btn);
      });

      if (s.checked) {
        $('result').className = `result ${s.correct ? 'good' : 'bad'}`;
        $('result').textContent = s.correct ? '回答正确' : '回答错误，正确答案已标出';
      } else if (s.showAnswer) {
        $('result').className = 'result good';
        $('result').textContent = '正确答案已标出';
      } else {
        $('result').className = 'result';
        $('result').textContent = '';
      }

      $('prevBtn').disabled = current === 0;
      $('nextBtn').disabled = current === order.length - 1;
      $('checkBtn').disabled = s.selected.size === 0 || s.checked;
      renderStats();
      renderNav();
    }

    function renderStats() {
      const values = [...state.values()].filter((s) => s.checked);
      const correct = values.filter((s) => s.correct).length;
      const wrong = values.length - correct;
      $('answeredCount').textContent = values.length;
      $('correctCount').textContent = correct;
      $('wrongCount').textContent = wrong;
      $('accuracy').textContent = values.length ? `${Math.round(correct / values.length * 100)}%` : '0%';
    }

    function renderNav() {
      const grid = $('navGrid');
      grid.innerHTML = '';
      order.forEach((id, i) => {
        const s = state.get(id);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = i + 1;
        if (i === current) btn.classList.add('current');
        if (s?.checked && s.correct) btn.classList.add('done');
        if (s?.checked && !s.correct) btn.classList.add('missed');
        btn.addEventListener('click', () => {
          current = i;
          render();
        });
        grid.appendChild(btn);
      });
    }

    $('checkBtn').addEventListener('click', () => {
      const q = getQuestion();
      const s = ensureState(q);
      s.checked = true;
      s.correct = sameSet(s.selected, answerSet(q));
      render();
    });

    $('showAnswerBtn').addEventListener('click', () => {
      const q = getQuestion();
      const s = ensureState(q);
      s.showAnswer = true;
      render();
    });

    $('prevBtn').addEventListener('click', () => {
      current = Math.max(0, current - 1);
      render();
    });

    $('nextBtn').addEventListener('click', () => {
      current = Math.min(order.length - 1, current + 1);
      render();
    });

    $('shuffleBtn').addEventListener('click', () => {
      wrongOnly = false;
      buildOrder();
      render();
    });

    $('resetBtn').addEventListener('click', () => {
      state.clear();
      wrongOnly = false;
      buildOrder();
      render();
    });

    $('wrongOnlyBtn').addEventListener('click', () => {
      const wrong = questions.filter((q) => state.get(q.id)?.checked && !state.get(q.id)?.correct);
      if (!wrong.length) return;
      wrongOnly = !wrongOnly;
      $('wrongOnlyBtn').textContent = wrongOnly ? '返回全部题目' : '只练错题';
      buildOrder();
      render();
    });

    $('sourceBtn').addEventListener('click', () => {
      const q = getQuestion();
      $('fullImg').src = q.image;
      $('sourceDialog').showModal();
    });

    $('closeDialogBtn').addEventListener('click', () => $('sourceDialog').close());

    function loadQuestions() {
      const embedded = document.getElementById('embeddedQuestions');
      if (embedded?.textContent?.trim()) {
        return Promise.resolve(JSON.parse(embedded.textContent));
      }
      return fetch('questions.json').then((r) => r.json());
    }

    loadQuestions().then((data) => {
      questions = data.questions;
      buildOrder();
      render();
    });
  </script>
</body>
</html>
